name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────
  # Deploy Backend → Azure App Service (Python)
  # ────────────────────────────────────────────
  deploy-backend:
    name: Backend → Azure App Service
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies into antenv
      run: |
        cd backend
        python -m venv antenv
        source antenv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Zip backend with installed packages
      run: |
        cd backend
        zip -r ../backend.zip . \
          --exclude "*.pyc" \
          --exclude "__pycache__/*" \
          --exclude "*.pyo"

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure App Service via Kudu
      run: |
        # Use Kudu's zipdeploy endpoint which preserves the antenv virtualenv
        CREDS=$(az webapp deployment list-publishing-credentials \
          --name ${{ secrets.AZURE_BACKEND_APP_NAME }} \
          --resource-group doc_knowledge \
          --query "{user:publishingUserName,pwd:publishingPassword}" \
          -o tsv)
        USER=$(echo "$CREDS" | cut -f1)
        PWD=$(echo "$CREDS" | cut -f2)
        
        curl -X POST \
          "https://${{ secrets.AZURE_BACKEND_APP_NAME }}.scm.azurewebsites.net/api/zipdeploy" \
          -u "$USER:$PWD" \
          -H "Content-Type: application/zip" \
          --data-binary @backend.zip \
          --max-time 300

  # ────────────────────────────────────────────
  # Build & Deploy Frontend → Azure Web App (Node)
  # ────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Azure Web App
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install and build frontend
      run: |
        cd frontend
        npm install
        npm run build
      env:
        VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Zip and deploy frontend
      run: |
        cd frontend
        zip -r frontend.zip . --exclude "node_modules/.cache/*"
        
        CREDS=$(az webapp deployment list-publishing-credentials \
          --name ${{ secrets.AZURE_FRONTEND_APP_NAME }} \
          --resource-group doc_knowledge \
          --query "{user:publishingUserName,pwd:publishingPassword}" \
          -o tsv)
        USER=$(echo "$CREDS" | cut -f1)
        PWD=$(echo "$CREDS" | cut -f2)
        
        curl -X POST \
          "https://${{ secrets.AZURE_FRONTEND_APP_NAME }}.scm.azurewebsites.net/api/zipdeploy" \
          -u "$USER:$PWD" \
          -H "Content-Type: application/zip" \
          --data-binary @frontend.zip \
          --max-time 300
