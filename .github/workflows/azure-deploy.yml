name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────
  # Deploy Backend → Azure App Service (Python)
  # ────────────────────────────────────────────
  deploy-backend:
    name: Backend → Azure App Service
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Zip backend for deployment
      run: |
        cd backend
        zip -r ../backend.zip . --exclude "venv/*" --exclude "__pycache__/*" --exclude "*.pyc" --exclude "antenv/*"

    - name: Deploy backend with Oryx build
      run: |
        az webapp deploy \
          --name ${{ secrets.AZURE_BACKEND_APP_NAME }} \
          --resource-group doc_knowledge \
          --src-path backend.zip \
          --type zip \
          --async false

  # ────────────────────────────────────────────
  # Build & Deploy Frontend → Azure Web App (Node)
  # ────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Azure Web App
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install and build frontend
      run: |
        cd frontend
        npm install
        npm run build
      env:
        VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Zip frontend for deployment
      run: |
        cd frontend
        zip -r ../frontend.zip . --exclude "node_modules/*"

    - name: Deploy frontend
      run: |
        az webapp deploy \
          --name ${{ secrets.AZURE_FRONTEND_APP_NAME }} \
          --resource-group doc_knowledge \
          --src-path ../frontend.zip \
          --type zip \
          --async false
