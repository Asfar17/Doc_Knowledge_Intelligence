name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────
  # Backend → Azure App Service (Python 3.12)
  # ──────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → Azure App Service
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies into __oryx_packages__
      # Oryx (Azure's build system) looks for packages in __oryx_packages__
      # This ensures uvicorn, gunicorn and all deps are found at runtime
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt --target="__oryx_packages__"

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy backend to Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
        package: backend

  # ──────────────────────────────────────────────────────
  # Frontend → Azure Web App (Node / Express static server)
  # ──────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Azure Web App
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install and build frontend
      run: |
        cd frontend
        npm install
        npm run build
      env:
        VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy frontend to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
        package: frontend
